<!DOCTYPE html>
<html>
<head>
  <title>Shared Workspace</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Shared Workspace</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="login.html">Login</a>
    <a href="register.html">Register</a>
  </nav>
</header>

<section>

  <div class="card">
    <h2>Search Workspaces</h2>

    <input id="searchLocation" placeholder="Location">

    <input id="maxPrice" type="number" placeholder="Max Price">
    <input id="minSeats" type="number" placeholder="Min Seats">

    <label><input type="checkbox" id="filterParking"> Parking</label>

    <select id="sortBy" onchange="searchWorkspaces()">
      <option value="">Sort By</option>
      <option value="priceLow">Price Low → High</option>
      <option value="priceHigh">Price High → Low</option>
      <option value="rating">Rating</option>
      <option value="date">Date</option>
    </select>

    <button onclick="searchWorkspaces()">Search</button>
  </div>

  <div id="results"></div>

</section>

<footer>
  <p>© 2026 Shared Workspace</p>
</footer>

<script src="script.js"></script>
</body>
</html>
