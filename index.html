<!DOCTYPE html>
<html>
<head>
  <title>Shared Workspace</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Shared Workspace</h1>
    <nav id="navBar">
      <a href="index.html">Home</a>
    </nav>
</header>

<section>

<div class="card">
  <h2>Search Workspaces</h2>

  <input id="searchLocation" placeholder="Location">
  <input id="searchNeighborhood" placeholder="Neighborhood">

  <input id="maxPrice" type="number" placeholder="Max Price">
  <input id="minSeats" type="number" placeholder="Min Seats">
  
  <label>Available From:</label>
  <input id="availableDate" type="date">

  <label><input type="checkbox" id="filterParking"> Parking</label>
  <label><input type="checkbox" id="filterTransport"> Public Transport</label>
  <label><input type="checkbox" id="smokingFilter"> Smoking</label>

  <select id="leaseFilter">
    <option value="">Any Term</option>
    <option value="day">Day</option>
    <option value="week">Week</option>
    <option value="month">Month</option>
  </select>

  <select id="sortBy">
    <option value="">Sort By</option>
    <option value="priceLow">Price Low → High</option>
    <option value="priceHigh">Price High → Low</option>
  </select>

  <button id="searchBtn">Search</button>
</div>

<div id="results"></div>

</section>

<footer>
  <p>© 2026 Shared Workspace</p>
</footer>

<script src="script.js"></script>
</body>
</html>
