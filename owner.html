<!DOCTYPE html>
<html>
<head>
  <title>Owner Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Owner Dashboard</h1>
  <nav>
    <a href="index.html">Home</a>
  </nav>
</header>

<section>

  <div class="card">
    <h2>Add Property</h2>

    <input id="address" placeholder="Address">
    <input id="neighborhood" placeholder="Neighborhood">
    <input id="sqft" type="number" placeholder="Square Feet">

    <label><input type="checkbox" id="parking"> Parking</label>
    <label><input type="checkbox" id="transport"> Public Transport</label>

    <button onclick="addProperty()">Add Property</button>
  </div>

  <div class="card">
    <h2>Add Workspace</h2>

    <input id="type" placeholder="Type">
    <input id="seats" type="number" placeholder="Seats">

    <label><input type="checkbox" id="smoking"> Smoking</label>

    <input id="date" type="date">

    <select id="lease">
      <option value="day">Day</option>
      <option value="week">Week</option>
      <option value="month">Month</option>
    </select>

    <input id="price" type="number" placeholder="Price">

    <button onclick="addWorkspace()">Add Workspace</button>
  </div>

  <div id="results"></div>

</section>

<script src="script.js"></script>
</body>
</html>
